spring:
  application:
    name: server
  
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3307/storedb?tinyInt1isBit=false}
    username: ${DATABASE_USERNAME:myuser}
    password: ${DATABASE_PASSWORD:mypass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    clean-on-validation-error: true
    clean-disabled: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false

custom:
  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID}
    auth-token: ${TWILIO_AUTH_TOKEN}
    verify-service-sid: ${TWILIO_VERIFY_SERVICE_SID}

  storage:
    url: ${STORAGE_URL:http://localhost:10000/devstoreaccount1}

  security:
    cors:
      allowed-origins: ${ALLOWED_ORIGINS:*}
      allowed-methods: ${ALLOWED_METHODS:*}
      allowed-headers: ${ALLOWED_HEADERS:*}
      allow-credentials: ${ALLOW_CREDENTIALS:false}
