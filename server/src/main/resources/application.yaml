spring:
  application:
    name: server
  config:
    import: file:.env[.properties]

# Twilio configuration properties, values are injected from environment variables
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID}
  auth-token: ${TWILIO_AUTH_TOKEN}
  verify-service-sid: ${TWILIO_VERIFY_SERVICE_SID}

# Storage configuration properties, values are injected from environment variables
storage:
  url: ${STORAGE_URL}


