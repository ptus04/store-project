<!DOCTYPE html>
<html lang="vi"
      th:replace="~{layout/main :: mainLayout(~{::title}, ~{::main})}"
      xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.name()} + ' | SLY'">Sản phẩm</title>
</head>
<body>
<main class="container mx-auto px-4 py-8" th:fragment="main">
    <div class="flex flex-col lg:flex-row gap-8">
        <!-- Left: Product Images -->
        <div class="lg:w-1/2">
            <div class="relative overflow-hidden rounded-2xl bg-gray-100 shadow-sm aspect-square">
                <img id="main-image"
                     th:alt="${product.name()}"
                     th:src="@{${storageUrl} + '/images/' + ${product.productImages().get(0).file()}}"
                     class="h-full w-full object-cover transition-transform duration-500 hover:scale-105"/>
                
                <div class="absolute top-4 left-4 flex flex-col gap-2">
                    <span th:if="${product.isNew()}" class="bg-blue-600 text-white text-xs font-bold px-3 py-1 rounded-full shadow-lg">MỚI</span>
                    <span th:if="${product.discount() > 0}" class="bg-red-600 text-white text-xs font-bold px-3 py-1 rounded-full shadow-lg" 
                          th:text="'-' + ${#numbers.formatDecimal(product.discount() * 100, 0, 0)} + '%'"></span>
                </div>
            </div>

            <!-- Thumbnails -->
            <div class="mt-4 flex gap-3 overflow-x-auto pb-2">
                <div th:each="img, iter : ${product.productImages()}" 
                     class="w-20 h-20 shrink-0 cursor-pointer rounded-lg border-2 overflow-hidden hover:border-red-500 transition-colors"
                     th:classappend="${iter.index == 0 ? 'border-red-500' : 'border-transparent'}"
                     th:onclick="|document.getElementById('main-image').src='@{${storageUrl} + '/images/' + ${img.file()}}'; this.parentElement.querySelectorAll('div').forEach(d => d.classList.remove('border-red-500')); this.classList.add('border-red-500')|">
                    <img th:src="@{${storageUrl} + '/images/' + ${img.file()}}" class="h-full w-full object-cover"/>
                </div>
            </div>
        </div>

        <!-- Right: Product Info -->
        <div class="lg:w-1/2 flex flex-col gap-6">
            <nav class="flex text-sm text-gray-500 gap-2 items-center">
                <a href="/" class="hover:text-red-500 transition-colors">Trang chủ</a>
                <span class="fa fa-chevron-right text-[10px]"></span>
                <span class="text-gray-900 font-medium" th:text="${product.name()}"></span>
            </nav>

            <h1 class="text-3xl font-bold text-gray-900 leading-tight" th:text="${product.name()}">Tên sản phẩm</h1>

            <div class="flex items-center gap-4">
                <div th:if="${product.discount() > 0}">
                    <span class="text-3xl font-bold text-red-600" 
                          th:text="${#numbers.formatDecimal(product.price() * (1 - product.discount()), 0, 'POINT', 0, 'COMMA') + ' ₫'}"></span>
                    <span class="text-lg text-gray-400 line-through ml-2" 
                          th:text="${#numbers.formatDecimal(product.price(), 0, 'POINT', 0, 'COMMA') + ' ₫'}"></span>
                </div>
                <span th:unless="${product.discount() > 0}" class="text-3xl font-bold text-gray-900" 
                      th:text="${#numbers.formatDecimal(product.price(), 0, 'POINT', 0, 'COMMA') + ' ₫'}"></span>
                
                <span th:if="${product.inStock() > 0}" class="ml-auto text-sm text-green-600 font-medium bg-green-50 px-3 py-1 rounded-full border border-green-100">
                    <i class="fa fa-check-circle mr-1"></i> Còn hàng
                </span>
                <span th:unless="${product.inStock() > 0}" class="ml-auto text-sm text-red-600 font-medium bg-red-50 px-3 py-1 rounded-full border border-red-100">
                    <i class="fa fa-times-circle mr-1"></i> Hết hàng
                </span>
            </div>

            <div class="flex gap-4">
                <button class="flex-1 bg-red-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-red-100 hover:bg-red-700 transition-all active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed"
                        th:disabled="${product.inStock() == 0}">
                    THÊM VÀO GIỎ HÀNG
                </button>
                <button class="p-4 border-2 border-gray-200 rounded-xl hover:bg-gray-50 transition-colors text-gray-400 hover:text-red-500">
                    <i class="fa-regular fa-heart text-xl"></i>
                </button>
            </div>

            <div class="space-y-4 pt-6 border-t border-gray-100">
                <details class="group border-b border-gray-50 pb-4" open>
                    <summary class="flex justify-between items-center font-bold text-gray-800 cursor-pointer list-none">
                        MÔ TẢ SẢN PHẨM
                        <span class="fa fa-chevron-down text-xs transition-transform group-open:rotate-180"></span>
                    </summary>
                    <div class="mt-4 text-gray-600 leading-relaxed text-sm whitespace-pre-line" th:text="${product.description()}"></div>
                </details>

                <details class="group border-b border-gray-50 pb-4">
                    <summary class="flex justify-between items-center font-bold text-gray-800 cursor-pointer list-none">
                        HƯỚNG DẪN BẢO QUẢN
                        <span class="fa fa-chevron-down text-xs transition-transform group-open:rotate-180"></span>
                    </summary>
                    <div class="mt-4 text-gray-600 leading-relaxed text-sm whitespace-pre-line" th:text="${product.careInstructions()}"></div>
                </details>
            </div>
        </div>
    </div>
</main>
</body>
</html>
