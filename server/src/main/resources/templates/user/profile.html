<!DOCTYPE html>
<html lang="vi" th:replace="~{layout/main :: mainLayout(~{::title}, ~{::main})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông tin tài khoản | SLY</title>
</head>
<body>
<main class="container mx-auto mt-8 max-w-4xl px-4">
    <div class="flex flex-col gap-8 md:flex-row">
        <!-- Sidebar -->
        <div class="w-full md:w-1/4">
            <div class="rounded-lg border border-gray-200 bg-white p-6 shadow-sm">
                <div class="mb-4 flex flex-col items-center">
                    <div class="mb-2 flex h-20 w-20 items-center justify-center rounded-full bg-red-100 text-2xl font-bold text-red-500">
                        <span th:text="${#strings.substring(user.name, 0, 1)}">U</span>
                    </div>
                    <h2 class="text-lg font-semibold" th:text="${user.name}">Tên người dùng</h2>
                    <p class="text-sm text-gray-500">KHÁCH HÀNG THÂN THIẾT</p>
                </div>
                <nav class="flex flex-col gap-2">
                    <a class="rounded-md bg-red-50 px-4 py-2 font-medium text-red-500" href="/tai-khoan">Thông tin cá nhân</a>
                    <a class="rounded-md px-4 py-2 text-gray-600 hover:bg-gray-50" href="/don-hang">Đơn hàng của tôi</a>
                    <a href="/dang-xuat" class="block w-full text-left rounded-md px-4 py-2 text-red-600 hover:bg-red-50">Đăng xuất</a>
                </nav>
            </div>
        </div>

        <!-- Content -->
        <div class="flex-1">
            <div class="rounded-lg border border-gray-200 bg-white p-8 shadow-sm">
                <h1 class="mb-6 text-2xl font-bold">Thông tin cá nhân</h1>
                
                <div class="grid grid-cols-1 gap-6 md:grid-cols-2">
                    <div class="flex flex-col gap-1">
                        <label class="text-sm font-medium text-gray-500">Họ và tên</label>
                        <p class="text-lg font-medium" th:text="${user.name}">Nguyễn Văn A</p>
                    </div>
                    
                    <div class="flex flex-col gap-1">
                        <label class="text-sm font-medium text-gray-500">Số điện thoại</label>
                        <p class="text-lg font-medium" th:text="${user.phone}">0862367173</p>
                    </div>
                    
                    <div class="flex flex-col gap-1">
                        <label class="text-sm font-medium text-gray-500">Email</label>
                        <p class="text-lg font-medium" th:text="${user.email ?: 'Chưa cập nhật'}">example@gmail.com</p>
                    </div>
                </div>

                <div class="mt-8 border-t pt-6">
                    <a href="/tai-khoan/chinh-sua" class="rounded-md bg-black px-6 py-2 font-semibold text-white hover:bg-gray-800">
                        Chỉnh sửa thông tin
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
