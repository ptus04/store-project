<!DOCTYPE html>
<html lang="vi" th:replace="~{layout/main :: mainLayout(~{::title}, ~{::main})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông tin tài khoản | SLY</title>
</head>
<body>
<main class="flex flex-col items-center justify-center p-4" style="min-height: 60vh;">
    
    <div class="flex w-11/12 flex-col rounded-2xl border border-gray-300 bg-white shadow-md md:w-8/12 lg:w-5/12" style="overflow: hidden;">
        
        <!-- Header background -->
        <div style="height: 120px; background: linear-gradient(135deg, #1f2937, #000000); width: 100%;"></div>
        
        <!-- Profile info section -->
        <div class="flex flex-col items-center px-6 pb-8" style="margin-top: -60px;">
            
            <form id="profileForm" th:action="@{/thong-tin-tai-khoan/cap-nhat}" method="post" enctype="multipart/form-data" class="w-full flex flex-col items-center">
                
                <!-- Avatar Container -->
                <div class="group relative bg-white rounded-full p-2 shadow-md mb-4" style="border-radius: 50%;">
                    <div class="bg-gray-200 flex items-center justify-center overflow-hidden relative" style="width: 120px; height: 120px; border-radius: 50%;">
                        <!-- Real Image -->
                        <img id="avatarPreview" th:if="${user.avatar != null}" 
                             th:src="@{'/uploads/' + ${user.avatar}}" 
                             alt="Avatar" 
                             style="width: 100%; height: 100%; object-fit: cover;"
                             onerror="this.style.display='none'; document.getElementById('avatarIcon').style.display='flex';">
                        
                        <!-- Default Icon (Show if no image OR if image fails to load) -->
                        <i id="avatarIcon" class="fa fa-user" 
                           th:style="${user.avatar == null} ? 'color: #9ca3af; font-size: 3rem; display: flex;' : 'color: #9ca3af; font-size: 3rem; display: none;'"></i>
                        
                        <!-- Overlay for changing photo (Always clickable but looks active in edit mode) -->
                        <label for="avatarFile" class="absolute inset-0 bg-black/40 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer text-white text-[10px] font-bold tracking-widest">
                            <i class="fa fa-camera mb-1 text-xl"></i>
                            <span>THAY ĐỔI</span>
                        </label>
                    </div>
                    <!-- Hidden Input -->
                    <input type="file" id="avatarFile" name="avatarFile" accept="image/*" class="hidden" onchange="previewImage(this)">
                </div>

                <!-- View Mode Information -->
                <div id="viewMode" class="w-full flex flex-col items-center">
                    <h1 class="font-bold text-2xl mb-1" th:text="${user.name}">Tên người dùng</h1>
                    <p class="text-gray-400 text-sm mb-6" th:text="${user.email ?: ''}"></p>
                    
                    <div class="mt-2 flex w-full flex-col gap-3">
                        <div class="flex items-center gap-4 rounded-xl border border-gray-100 p-4 bg-gray-50/50">
                            <div class="flex items-center justify-center w-10 h-10 rounded-full bg-white shadow-sm border border-gray-100">
                                <i class="fa fa-phone text-red-500"></i>
                            </div>
                            <div class="flex flex-col">
                                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Số điện thoại</span>
                                <span class="font-bold text-gray-800" th:text="${user.phone}">0123456789</span>
                            </div>
                        </div>

                        <div class="flex items-center gap-4 rounded-xl border border-gray-100 p-4 bg-gray-50/50">
                            <div class="flex items-center justify-center w-10 h-10 rounded-full bg-white shadow-sm border border-gray-100">
                                <i class="fa fa-envelope text-gray-400"></i>
                            </div>
                            <div class="flex flex-col">
                                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Email liên hệ</span>
                                <span class="font-bold text-gray-800" th:text="${user.email ?: ''}"></span>
                            </div>
                        </div>
                    </div>
                    
                    <button type="button" onclick="toggleEdit(true)" class="mt-8 px-10 py-3 bg-black text-white rounded-full font-bold text-xs tracking-widest hover:bg-gray-800 transition-all cursor-pointer shadow-lg shadow-black/10">
                        CHỈNH SỬA HỒ SƠ
                    </button>
                </div>

                <!-- Edit Mode Form Fields (Hidden by default) -->
                <div id="editMode" class="w-full hidden flex flex-col gap-5">
                    <div class="space-y-1">
                        <label for="nameInput" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Họ và tên</label>
                        <input type="text" id="nameInput" name="name" th:value="${user.name}" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:bg-white focus:border-black focus:ring-4 focus:ring-black/5 outline-none transition-all font-medium" required>
                    </div>

                    <div class="space-y-1">
                        <label for="emailInput" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Địa chỉ Email</label>
                        <input type="email" id="emailInput" name="email" th:value="${user.email}" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:bg-white focus:border-black focus:ring-4 focus:ring-black/5 outline-none transition-all font-medium">
                    </div>

                    <div class="flex gap-3 mt-4">
                        <button type="submit" class="flex-1 bg-black text-white py-4 rounded-xl font-bold hover:bg-gray-800 transition-all shadow-lg shadow-black/10 cursor-pointer">
                            LƯU THAY ĐỔI
                        </button>
                        <button type="button" onclick="toggleEdit(false)" class="flex-1 bg-gray-100 text-gray-600 py-4 rounded-xl font-bold hover:bg-gray-200 transition-all cursor-pointer">
                            HỦY
                        </button>
                    </div>
                    
                    <p class="text-center text-[10px] text-gray-400 mt-2 italic">* Bạn có thể click vào Avatar để thay đổi ảnh</p>
                </div>
            </form>
            
            <div class="mt-8 w-full border-t border-gray-100 pt-6">
                <form th:action="@{/dang-xuat}" method="post" class="w-full">
                    <button type="submit" class="w-full group flex items-center justify-center gap-2 py-3 text-gray-300 hover:text-red-500 font-bold text-xs tracking-widest transition-colors cursor-pointer">
                        <i class="fa fa-power-off group-hover:scale-110 transition-transform"></i> ĐĂNG XUẤT
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function toggleEdit(show) {
            document.getElementById('viewMode').classList.toggle('hidden', show);
            document.getElementById('editMode').classList.toggle('hidden', !show);
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    let preview = document.getElementById('avatarPreview');
                    const icon = document.getElementById('avatarIcon');
                    
                    if (preview) {
                        preview.src = e.target.result;
                    } else {
                        // Create img if it doesn't exist
                        preview = document.createElement('img');
                        preview.id = 'avatarPreview';
                        preview.src = e.target.result;
                        preview.style.width = '100%';
                        preview.style.height = '100%';
                        preview.style.objectFit = 'cover';
                        icon.parentElement.insertBefore(preview, icon);
                        icon.remove();
                    }
                    
                    // Automatically enter edit mode if not already
                    toggleEdit(true);
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</main>
</body>
</html>
