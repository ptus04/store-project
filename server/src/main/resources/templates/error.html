<!DOCTYPE html>
<html lang="vi" th:replace="~{layout/main :: mainLayout(~{::title}, ~{::main})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${error} + ' | SLY'"></title>
</head>
<body>
<main class="flex h-96 items-center justify-center gap-4">
    <h2 class="text-6xl text-center font-bold text-gray-500">
        <i class="fa fa-warning text-red-500"></i>
        <th:block th:text=" ${status}"></th:block>
    </h2>

    <div>
        <h1 class="text-center text-2xl font-bold" th:text="${error}">Bad Request</h1>
        <p>Path: <span th:text="${path}"></span></p>
        <p>Message: <span th:text="${message}">Something went wrong</span></p>
        <p>Timestamp: <span th:text="${timestamp}"></span></p>
        <hr>
        <p>
            Vui lòng
            <a class="text-red-500" href="javascript:history.back()">quay lại trang trước đó</a>
            hoặc <a class="text-red-500" href="/">trở về trang chủ</a>
        </p>
    </div>
</main>
</body>
</html>
